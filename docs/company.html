<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Workspace Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: light;
      --bg: #f6f8fc;
      --card: rgba(255, 255, 255, 0.94);
      --accent: #2563eb;
      --text: #0f172a;
      --muted: #64748b;
      --line: rgba(148, 163, 184, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, rgba(96, 165, 250, 0.16), transparent 55%),
                  radial-gradient(circle at 80% 10%, rgba(191, 219, 254, 0.55), transparent 45%),
                  linear-gradient(180deg, #ffffff 0%, #eef4ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem 2rem;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }
    .wrap {
      width: min(660px, 100%);
      border-radius: 2rem;
      padding: 2.8rem;
      border: 1px solid rgba(255,255,255,0.7);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 40px 90px rgba(37, 99, 235, 0.12);
      backdrop-filter: blur(30px);
    }

    .nav-top {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }
    .nav-top .link {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .nav-top .icon {
      width: 1.1rem;
      height: 1.1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .nav-top .icon svg {
      width: 100%;
      height: 100%;
      fill: var(--text);
    }
    h1 { margin: 0 0 0.5rem; }
    p { margin: 0 0 1.6rem; color: var(--muted); }
    label { font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    input {
      width: 100%;
      margin-top: 0.4rem;
      margin-bottom: 1.4rem;
      padding: 0.95rem 1.2rem;
      border-radius: 1rem;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      font-size: 1rem;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    button {
      width: 100%;
      border: none;
      border-radius: 1rem;
      padding: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(120deg, #2563eb, #60a5fa);
      color: #ffffff;
      cursor: pointer;
      box-shadow: 0 18px 35px rgba(37, 99, 235, 0.22);
    }
    .hint { margin-top: 0.8rem; font-size: 0.9rem; color: var(--muted); text-align: center; }
  </style>
  </head>
<body>
  <div class="nav-top"><a href="signup.html" class="link"><span class="icon" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M12.5 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Back</a></div>
  <div class="wrap">
    <p class="label" style="letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);">Step 2</p>
    <h1>Name your workspace</h1>
    <p>This label appears on dashboards, invoices, and agent invitations. You can change it later.</p>
        <form id="companyForm">
      <label>Company / workspace name</label>
      <input type="text" placeholder="Operion Labs" required />
      <label>Submit your URL (optional)</label>
      <input type="text" placeholder="https://" />
      <button type="submit">Continue</button>
    </form>
    <p class="hint">Next: invite teammates & allocate credits.</p>
  </div>
  <script>
    document.getElementById('companyForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = e.target.querySelector('input[type="text"]').value.trim();
      sessionStorage.setItem('operionCompanyName', name || 'Your company');
      window.location.href = 'industry.html';
    });
  </script>
</body>
</html>
