<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: light;
      --bg: #f6f8fc;
      --card: rgba(255, 255, 255, 0.92);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --line: rgba(148, 163, 184, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, rgba(96, 165, 250, 0.16), transparent 55%),
                  radial-gradient(circle at 80% 10%, rgba(191, 219, 254, 0.55), transparent 45%),
                  linear-gradient(180deg, #ffffff 0%, #eef4ff 100%);
      color: var(--text);
      padding: 2rem;
    }
    .nav-top {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
    }
    .nav-top .icon {
      width: 1.1rem;
      height: 1.1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: inherit;
    }
    .nav-top .icon svg {
      width: 100%;
      height: 100%;
    }
    .wrap {
      width: min(1400px, 100%);
      min-height: calc(100vh - 4rem);
      padding: 3.5rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
    }
    h1 { margin: 0 0 0.2rem; }
    p.lede { margin: 0 0 1.2rem; color: var(--muted); max-width: 720px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .sticky-search {
      position: sticky;
      top: 0;
      padding-bottom: 1rem;
      z-index: 5;
      backdrop-filter: blur(20px);
    }
    .search {
      width: 100%;
      border-radius: 1rem;
      border: 1px solid rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.92);
      color: var(--text);
      padding: 0.95rem 1rem;
      font-size: 1rem;
    }
    .count-pill {
      padding: 0.3rem 0.7rem;
      border-radius: 0.9rem;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
      font-size: 0.8rem;
      color: var(--text);
      text-align: center;
    }
    .suggested {
      margin-bottom: 2rem;
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 1.5rem;
      padding: 1.4rem;
      background: rgba(255,255,255,0.78);
    }
    .suggested h3 {
      margin: 0 0 0.6rem;
      font-size: 1rem;
    }
    .suggested p {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .suggested-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.75rem;
    }
    .suggested button {
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.92);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .suggested button span { font-size: 0.85rem; color: var(--muted); }
    .suggested button, label.card, .selected-card { box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04); }
    .suggested button.picked {
      border-color: rgba(37,99,235,0.55);
      background: rgba(37,99,235,0.1);
    }
    details.category {
      border-radius: 1.6rem;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.78);
      margin-bottom: 1.2rem;
      overflow: hidden;
    }
    summary {
      list-style: none;
      cursor: pointer;
      padding: 1.4rem 1.6rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    summary::-webkit-details-marker { display: none; }
    .badge { font-size: 0.85rem; color: var(--muted); }
    .agents {
      padding: 0 1.6rem 1.6rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
    }
    label.card {
      border-radius: 1.2rem;
      border: 1px solid var(--line);
      background: var(--card);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      cursor: pointer;
      position: relative;
      min-height: 140px;
    }
    label.card input {
      position: absolute;
      top: 1rem;
      right: 1rem;
      transform: scale(1.15);
    }
    .card p { margin: 0; color: var(--muted); font-size: 0.9rem; line-height: 1.4; }
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 270px;
      gap: 1.5rem;
    }
    .main-column {
      display: flex;
      flex-direction: column;
      padding-right: 0.75rem;
      padding-top: 0.5rem;
      height: 100%;
    }
    .list-scroll {
      flex: 1;
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    .side-panel {
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 0.7rem;
      background: rgba(255,255,255,0.9);
      position: sticky;
      top: 1rem;
      height: calc(100vh - 2rem);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .side-panel h3 { margin: 0; font-size: 1rem; }
    .side-note { margin: 0; font-size: 0.85rem; color: var(--muted); }
    .selected-list {
      flex: 1;
      min-height: 0;
      max-height: calc(100vh - 360px);
      border: 1px dashed rgba(148, 163, 184, 0.45);
      border-radius: 0.75rem;
      padding: 0.35rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      color: var(--muted);
      font-size: 0.84rem;
      overflow-y: auto;
    }
    .selected-list .empty { color: var(--muted); }
    .selected-card {
      border-radius: 1.1rem;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.96);
      padding: 0.65rem 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      font-size: 0.85rem;
    }
    .selected-card.muted {
      justify-content: center;
      color: var(--muted);
    }
    .selected-card button {
      border: none;
      background: rgba(37,99,235,0.08);
      color: #1d4ed8;
      border-radius: 0.8rem;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .primary {
      border: none;
      border-radius: 0.95rem;
      padding: 0.65rem 1.05rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: linear-gradient(120deg, #2563eb, #60a5fa);
      color: #ffffff;
      cursor: pointer;
      box-shadow: 0 18px 35px rgba(37, 99, 235, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 0.2rem;
    }
    .primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 25px 55px rgba(37, 99, 235, 0.18);
    }
    .primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .side-panel { position: static; }
    }
    @media (max-width: 768px) {
      body { padding: 4rem 1rem 2rem; }
      .wrap { padding: 2.5rem 1.5rem; }
      summary { flex-direction: column; align-items: flex-start; }
      label.card input { position: static; align-self: flex-start; }
    }
  </style>
</head>

        'Voice-to-Text Agent — Dictation.',
        'Text-to-Speech Agent — Natural narration.',
        'Meeting Communication Assistant Agent — Talking points.',
        'Message Tone Improvement Agent — Friendly/formal tone.',
        'Multilingual Chat Agent — Chats in many languages.',
        'Cultural Communication Advisor Agent — Cross-cultural cues.'
      ]}
    ];

    const catalogEl = document.getElementById('catalog');
    const searchEl = document.getElementById('search');
    const countEl = document.getElementById('selectedCount');
    const selectedListEl = document.getElementById('selectedList');
    const suggestedEl = document.getElementById('suggested');

    const stored = new Set(JSON.parse(sessionStorage.getItem('operionCommonAgents') || '[]'));

    function renderCatalog(filter = '') {
      catalogEl.innerHTML = '';
      const fragment = document.createDocumentFragment();
      const lowerFilter = filter.trim().toLowerCase();

      categories.forEach(category => {
        const matchesCategory = category.name.toLowerCase().includes(lowerFilter);
        const filteredAgents = category.agents.filter(agent => agent.toLowerCase().includes(lowerFilter));
        if (!filter || matchesCategory || filteredAgents.length) {
          const details = document.createElement('details');
          details.className = 'category';
          details.open = filteredAgents.length > 0 || filter ? true : false;

          const summary = document.createElement('summary');
          summary.innerHTML = `<span>${category.name}</span><span class="badge">${category.agents.length} agents</span>`;
          details.appendChild(summary);

          const grid = document.createElement('div');
          grid.className = 'agents';

          (filteredAgents.length ? filteredAgents : category.agents).forEach(agent => {
            const label = document.createElement('label');
            label.className = 'card';
            const [title, desc] = agent.split(' — ');
            label.innerHTML = `
              <strong>${title}</strong>
              <p>${desc || ''}</p>
            `;
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.value = title;
            if (stored.has(title)) input.checked = true;
            input.addEventListener('change', () => {
              if (input.checked) {
                stored.add(title);
              } else {
                stored.delete(title);
              }
              updateSelected();
            });
            label.appendChild(input);
            grid.appendChild(label);
          });

          details.appendChild(grid);
          fragment.appendChild(details);
        }
      });

      catalogEl.appendChild(fragment);
      updateSelected();
    }

    function renderSuggestions() {
      if (!suggestedEl) return;
      suggestedEl.innerHTML = '<h3>Recommended for you</h3><p>Popular staples most teams enable on day one.</p>';
      const grid = document.createElement('div');
      grid.className = 'suggested-grid';
      suggestionPool.forEach(item => {
        const btn = document.createElement('button');
        btn.dataset.title = item.title;
        btn.innerHTML = `<strong>${item.title}</strong><span>${item.desc}</span>`;
        if (stored.has(item.title)) btn.classList.add('picked');
        btn.addEventListener('click', () => {
          if (stored.has(item.title)) {
            stored.delete(item.title);
          } else {
            stored.add(item.title);
          }
          updateSelected();
          renderCatalog(searchEl.value);
        });
        grid.appendChild(btn);
      });
      suggestedEl.appendChild(grid);
    }

    function updateSelected() {
      const arr = Array.from(stored);
      countEl.textContent = `${arr.length} selected`;
      if (arr.length) {
        selectedListEl.innerHTML = arr.map(name => `
          <div class="selected-card">
            <span>${name}</span>
            <button type="button" data-name="${name}">Remove</button>
          </div>
        `).join('');
      } else {
        selectedListEl.innerHTML = '<span class="empty">No agents selected yet.</span>';
      }
      selectedListEl.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.name;
          stored.delete(name);
          updateSelected();
          renderCatalog(searchEl.value);
        });
      });
      sessionStorage.setItem('operionCommonAgents', JSON.stringify(arr));
      renderSuggestions();
    }

    searchEl.addEventListener('input', e => {
      renderCatalog(e.target.value);
    });

    document.getElementById('commonContinue').addEventListener('click', () => {
      const arr = Array.from(stored);
      if (!arr.length) {
        alert('Select at least one common agent.');
        return;
      }
      window.location.href = 'main-agent.html';
    });

    renderCatalog();
  </script>
</body>
</html>
