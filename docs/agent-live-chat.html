<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Agent Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: light;
      --bg: #f8f9fb;
      --panel: #ffffff;
      --card: #ffffff;
      --border: rgba(15,23,42,0.08);
      --text: #0f172a;
      --muted: #475467;
      --chip: rgba(15,23,42,0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      padding: 4rem clamp(1rem, 4vw, 3rem);
    }
    a.nav-top {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,0.12);
      background: #ffffff;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 25px rgba(15,23,42,0.08);
    }
    .workspace {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .agent-panel, .chat-panel {
      border-radius: 1.5rem;
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 1.75rem;
      box-shadow: 0 25px 45px rgba(15,23,42,0.08);
    }
    .agent-panel h1 { margin: 0 0 0.2rem; font-size: 1.85rem; }
    .agent-panel p { margin: 0; color: var(--muted); }
    .category-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,0.12);
      padding: 0.2rem 0.75rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--chip);
    }
    .agent-meta-grid {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.8rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .agent-meta-grid strong { color: var(--text); }
    .agent-summary {
      margin-top: 1rem;
      border-radius: 1.1rem;
      border: 1px solid rgba(15,23,42,0.06);
      background: #f8fafc;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      font-size: 0.95rem;
    }
    .agent-summary strong { font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .capability-list {
      margin: 1.25rem 0 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .capability-list li {
      display: flex;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--muted);
      align-items: flex-start;
    }
    .capability-list li span {
      width: 1.1rem;
      height: 1.1rem;
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,0.12);
      background: #eef2ff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: #4338ca;
      flex-shrink: 0;
      margin-top: 0.2rem;
    }
    .prompt-grid {
      margin-top: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .prompt-grid button {
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,0.12);
      background: #f8fafc;
      color: var(--text);
      padding: 0.5rem 0.85rem;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .prompt-grid button:hover { border-color: #4338ca; color: #4338ca; }
    .chat-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .chat-head { display: flex; justify-content: space-between; align-items: center; }
    .status-pill {
      border-radius: 999px;
      border: 1px solid rgba(5,150,105,0.2);
      background: #ecfdf5;
      color: #047857;
      padding: 0.2rem 0.75rem;
      font-size: 0.8rem;
      text-transform: capitalize;
    }
    .chat-log {
      min-height: 360px;
      border-radius: 1.2rem;
      border: 1px solid rgba(15,23,42,0.08);
      background: #f8fafc;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      overflow-y: auto;
    }
    .chat-entry {
      border-radius: 1rem;
      border: 1px solid rgba(15,23,42,0.08);
      padding: 0.85rem 1rem;
      background: #ffffff;
    }
    .chat-entry span { font-size: 0.75rem; color: var(--muted); }
    .chat-entry.user { align-self: flex-end; background: #e0e7ff; border-color: #c7d2fe; }
    form { display: grid; grid-template-columns: auto 1fr auto; gap: 0.75rem; align-items: center; }
    form input {
      width: 100%;
      border-radius: 1.1rem;
      border: 1px solid rgba(15,23,42,0.12);
      background: #f1f5f9;
      color: var(--text);
      padding: 0.9rem 1rem;
    }
    form button[type="submit"] {
      border: none;
      border-radius: 1rem;
      padding: 0.9rem 1.4rem;
      background: linear-gradient(120deg, #4da8ff, #7c6bff);
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
    }
    .upload-btn {
      border-radius: 999px;
      border: 1px dashed rgba(15,23,42,0.2);
      background: #f8fafc;
      color: var(--muted);
      padding: 0.55rem 0.95rem;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .upload-hint {
      margin: 0.2rem 0 0;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1rem;
    }
    .empty-state {
      border-radius: 1.5rem;
      border: 1px dashed rgba(15,23,42,0.15);
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      background: #fff;
    }
    @media (max-width: 900px) {
      body { padding-top: 5rem; }
      .workspace { gap: 1.5rem; }
    }
  </style>
</head>
<body>
  <a href="dashboard.html" class="nav-top"><span class="icon" aria-hidden="true">⬅</span><span>Back to dashboard</span></a>
  <div class="workspace" id="workspaceRoot">
    <aside class="agent-panel">
      <span class="category-chip" id="agentCategory">Agent</span>
      <h1 id="agentName">Agent name</h1>
      <p id="agentVersion">Version —</p>
      <div class="agent-meta-grid">
        <div>Provider · <strong id="agentProvider">—</strong></div>
        <div>Model · <strong id="agentModel">—</strong></div>
        <div>Temperature · <strong id="agentTemp">—</strong></div>
      </div>
      <div class="agent-summary">
        <strong>Role summary</strong>
        <div id="agentSummary"></div>
      </div>
      <div>
        <h3 style="margin:1.25rem 0 0.4rem; font-size:0.9rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted);">Capabilities</h3>
        <ul class="capability-list" id="agentCapabilities"></ul>
      </div>
      <div>
        <h3 style="margin:1.25rem 0 0.4rem; font-size:0.9rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted);">Quick prompts</h3>
        <div class="prompt-grid" id="agentPrompts"></div>
      </div>
    </aside>
    <section class="chat-panel">
      <div class="chat-head">
        <div>
          <strong>Chat with <span id="chatAgentName"></span></strong>
          <p style="margin:0.2rem 0 0; color:var(--muted); font-size:0.9rem;">Use a quick prompt or type your own request.</p>
        </div>
        <span class="status-pill" id="agentStatus">Online</span>
      </div>
      <div class="chat-log" id="chatLog" aria-live="polite"></div>
      <form id="chatForm">
        <button type="button" class="upload-btn" id="uploadBtn">📎 Upload</button>
        <input type="text" id="chatInput" placeholder="Type a command or paste a prompt…" autocomplete="off" />
        <button type="submit">Send</button>
      </form>
      <input type="file" id="chatFile" hidden />
      <p class="upload-hint" id="uploadHint"></p>
    </section>
  </div>
  <script src="./data/agentsData.js"></script>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const requestedId = params.get('id');
      const catalog = Array.isArray(window.agentsData) ? window.agentsData : [];
      const lookup = new Map(catalog.map(agent => [agent.id, agent]));
      const agent = lookup.get(requestedId) || catalog[0] || null;
      const workspaceRoot = document.getElementById('workspaceRoot');

      if (!agent) {
        workspaceRoot.innerHTML = '<div class="empty-state"><h2>No agent data loaded</h2><p>Pick an agent from the dashboard first.</p></div>';
        return;
      }

      const categoryThemes = {
        calendar: { label: 'Calendar', emoji: '📅', tint: '#60a5fa' },
        astrology: { label: 'Astrology', emoji: '✨', tint: '#c084fc' },
        news: { label: 'News', emoji: '📰', tint: '#38bdf8' },
        lifestyle: { label: 'Lifestyle', emoji: '🌿', tint: '#34d399' },
        shopping: { label: 'Shopping & Household', emoji: '🛒', tint: '#fbbf24' },
        entertainment: { label: 'Entertainment & Media', emoji: '🎬', tint: '#f472b6' },
        health: { label: 'Health & Wellness', emoji: '❤️', tint: '#fb7185' },
        business: { label: 'Business & Professional', emoji: '💼', tint: '#fb923c' },
        sales: { label: 'Sales & Marketing', emoji: '📣', tint: '#f472b6' },
        finance: { label: 'Finance', emoji: '💰', tint: '#14b8a6' },
        prompt: { label: 'Prompt Agents', emoji: '📝', tint: '#a78bfa' },
        dev: { label: 'Developer & Tech', emoji: '</>', tint: '#93c5fd' },
        ops: { label: 'Operations', emoji: '⚙️', tint: '#94a3b8' },
        travel: { label: 'Travel', emoji: '✈️', tint: '#fbbf24' },
        qa: { label: 'Quality', emoji: '✔️', tint: '#d1d5db' },
        default: { label: 'Agent', emoji: '🤖', tint: '#cbd5f5' }
      };

      const categoryChip = document.getElementById('agentCategory');
      const agentNameEl = document.getElementById('agentName');
      const chatAgentName = document.getElementById('chatAgentName');
      const agentVersionEl = document.getElementById('agentVersion');
      const agentProviderEl = document.getElementById('agentProvider');
      const agentModelEl = document.getElementById('agentModel');
      const agentTempEl = document.getElementById('agentTemp');
      const agentSummaryEl = document.getElementById('agentSummary');
      const agentCapabilitiesEl = document.getElementById('agentCapabilities');
      const agentPromptsEl = document.getElementById('agentPrompts');
      const agentStatusEl = document.getElementById('agentStatus');
      const chatLog = document.getElementById('chatLog');
      const chatForm = document.getElementById('chatForm');
      const chatInput = document.getElementById('chatInput');
      const uploadBtn = document.getElementById('uploadBtn');
      const chatFileInput = document.getElementById('chatFile');
      const uploadHint = document.getElementById('uploadHint');

      uploadBtn?.addEventListener('click', () => chatFileInput?.click());
      chatFileInput?.addEventListener('change', () => {
        const file = chatFileInput.files?.[0] || null;
        uploadHint.textContent = file ? `Attached: ${file.name}` : '';
      });

      const theme = categoryThemes[agent.category] || categoryThemes.default;
      categoryChip.textContent = `${theme.emoji} ${theme.label}`;
      categoryChip.style.borderColor = theme.tint;
      categoryChip.style.color = theme.tint;
      categoryChip.style.background = `${theme.tint}1a`;

      agentNameEl.textContent = agent.name;
      chatAgentName.textContent = agent.name;
      agentVersionEl.textContent = agent.version ? `Version ${agent.version}` : 'Version —';
      agentProviderEl.textContent = agent.provider || '—';
      agentModelEl.textContent = agent.model || '—';
      agentTempEl.textContent = typeof agent.temperature === 'number' ? agent.temperature.toFixed(2) : '—';
      agentStatusEl.textContent = agent.status || 'online';
      if ((agent.status || '').toLowerCase() !== 'online') {
        agentStatusEl.classList.remove('status-pill');
        agentStatusEl.classList.add('status-pill');
      }

      const summary = Array.isArray(agent.roleSummary) && agent.roleSummary.length
        ? agent.roleSummary.map(line => `<p>${line}</p>`).join('')
        : '<p>No summary available.</p>';
      agentSummaryEl.innerHTML = summary;

      const capabilities = Array.isArray(agent.capabilities) && agent.capabilities.length
        ? agent.capabilities.map(item => `<li><span>✔</span>${item}</li>`).join('')
        : '<li><span>ℹ</span>No capabilities listed.</li>';
      agentCapabilitiesEl.innerHTML = capabilities;

      if (Array.isArray(agent.suggestedPrompts) && agent.suggestedPrompts.length) {
        agentPromptsEl.innerHTML = agent.suggestedPrompts.slice(0, 6).map(prompt => `<button type="button">${prompt}</button>`).join('');
      } else {
        agentPromptsEl.innerHTML = '<p style="color:var(--muted);">No quick prompts yet.</p>';
      }

      agentPromptsEl.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          chatInput.value = btn.textContent;
          chatInput.focus();
        });
      });

      function appendMessage(from, text, role = 'agent') {
        const entry = document.createElement('div');
        entry.className = `chat-entry ${role}`;
        entry.innerHTML = `<span>${from}</span><p>${text}</p>`;
        chatLog.appendChild(entry);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      const teaser = agent.roleSummary?.[0] || 'Ready when you are.';
      appendMessage(agent.name, teaser);
      appendMessage(agent.name, 'Drop a request or pick a quick prompt to get started.');

      chatForm.addEventListener('submit', event => {
        event.preventDefault();
        const value = chatInput.value.trim();
        const file = chatFileInput?.files?.[0] || null;
        if (!value && !file) return;
        if (value) {
          appendMessage('You', value, 'user');
          chatInput.value = '';
        }
        if (file) {
          appendMessage('You', `📎 Attached: ${file.name}`, 'user');
          chatFileInput.value = '';
          uploadHint.textContent = '';
        }
        setTimeout(() => {
          const reply = file
            ? `${agent.name} received the file and is processing it.`
            : agent.capabilities?.[0] || 'Working on it now.';
          appendMessage(agent.name, reply);
        }, 600);
      });
    })();
  </script>
</body>
</html>
