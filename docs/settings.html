<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: dark;
      --bg: #050814;
      --card: rgba(255,255,255,0.03);
      --text: #eef2ff;
      --muted: #9badcf;
      --accent: #7c6bff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 12% 18%, rgba(124,107,255,0.35), transparent 60%),
                  linear-gradient(180deg, #03050b, #050814);
      color: var(--text);
      padding: clamp(1.5rem, 2vw, 2.8rem);
      transition: background 0.3s ease, color 0.3s ease;
    }
    body.theme-light {
      color-scheme: light;
      --bg: #f5f4ff;
      --card: rgba(15,23,42,0.04);
      --text: #0f172a;
      --muted: #617095;
      background: radial-gradient(circle at 12% 18%, rgba(124,107,255,0.25), transparent 65%),
                  linear-gradient(180deg, #fefefe, #ebe9ff);
    }
    .page { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
    header { display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; align-items: flex-start; }
    header a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    h1 { margin: 0; font-size: clamp(1.8rem, 3vw, 2.4rem); }
    .muted { color: var(--muted); margin: 0.4rem 0 0; max-width: 540px; }
    .card {
      border-radius: 1.4rem;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--card);
      padding: clamp(1.2rem, 2vw, 1.8rem);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: border-color 0.2s ease, background 0.3s ease;
    }
    body.theme-light .card { border-color: rgba(15,23,42,0.08); }
    .card h2 { margin: 0; font-size: 1.1rem; }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 0.35rem 0.9rem;
      cursor: pointer;
      background: rgba(255,255,255,0.05);
    }
    body.theme-light .toggle { border-color: rgba(15,23,42,0.1); background: rgba(15,23,42,0.04); }
    .toggle span { font-weight: 500; }
    .notice { font-size: 0.85rem; color: var(--muted); margin: 0; }
    .pref-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    label.pref-row {
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    label.pref-row:hover { border-color: rgba(124,107,255,0.4); }
    body.theme-light label.pref-row { border-color: rgba(15,23,42,0.08); }
    label.pref-row input { margin-top: 0.2rem; }
    .pref-row span { font-size: 0.9rem; }
    button.save-btn {
      align-self: flex-start;
      border-radius: 999px;
      border: none;
      padding: 0.65rem 1.4rem;
      background: linear-gradient(120deg, #4da8ff, #7c6bff);
      color: #041021;
      font-weight: 600;
      cursor: pointer;
    }
    .status { font-size: 0.9rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1>Workspace settings</h1>
        <p class="muted">Choose how Operion looks and how often it pings you.</p>
      </div>
      <a href="dashboard.html">← Back to dashboard</a>
    </header>

    <section class="card" id="themeCard">
      <h2>Theme</h2>
      <p class="notice">Switch between dark cockpit and light review modes.</p>
      <button class="toggle" id="themeToggle" type="button">
        <span id="themeLabel">Dark mode</span>
      </button>
    </section>

    <section class="card">
      <h2>Notification preferences</h2>
      <p class="notice">Pick which nudges you want from Operion.</p>
      <div class="pref-grid" id="prefGrid">
        <!-- populated via JS -->
      </div>
      <button class="save-btn" id="savePrefs" type="button">Save preferences</button>
      <p class="status" id="saveStatus">Not saved yet.</p>
    </section>
  </div>

  <script>
    const STORAGE_THEME = 'operionThemePreference';
    const STORAGE_PREFS = 'operionNotificationPrefs';
    const body = document.body;
    const themeToggle = document.getElementById('themeToggle');
    const themeLabel = document.getElementById('themeLabel');
    const prefGrid = document.getElementById('prefGrid');
    const saveBtn = document.getElementById('savePrefs');
    const saveStatus = document.getElementById('saveStatus');

    const prefOptions = [
      { id: 'deploy', label: 'Deployment windows' },
      { id: 'incidents', label: 'Incident escalations' },
      { id: 'agents', label: 'Agent offline alerts' },
      { id: 'digest', label: 'Daily digest' }
    ];

    const renderPrefs = (selected = []) => {
      prefGrid.innerHTML = prefOptions.map(option => `
        <label class="pref-row">
          <input type="checkbox" value="${option.id}" ${selected.includes(option.id) ? 'checked' : ''} />
          <span>${option.label}</span>
        </label>
      `).join('');
    };

    const loadTheme = () => {
      const stored = sessionStorage.getItem(STORAGE_THEME) || 'dark';
      body.classList.toggle('theme-light', stored === 'light');
      themeLabel.textContent = stored === 'light' ? 'Light mode' : 'Dark mode';
    };

    const toggleTheme = () => {
      const isLight = body.classList.toggle('theme-light');
      sessionStorage.setItem(STORAGE_THEME, isLight ? 'light' : 'dark');
      loadTheme();
    };

    const loadPrefs = () => {
      const stored = JSON.parse(sessionStorage.getItem(STORAGE_PREFS) || '[]');
      renderPrefs(stored);
    };

    const savePrefs = () => {
      const selected = Array.from(prefGrid.querySelectorAll('input:checked')).map(input => input.value);
      sessionStorage.setItem(STORAGE_PREFS, JSON.stringify(selected));
      saveStatus.textContent = 'Preferences saved.';
      setTimeout(() => saveStatus.textContent = 'Not saved yet.', 3000);
    };

    themeToggle?.addEventListener('click', toggleTheme);
    saveBtn?.addEventListener('click', savePrefs);

    loadTheme();
    loadPrefs();
  </script>
</body>
</html>
