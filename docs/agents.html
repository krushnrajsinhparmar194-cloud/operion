<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Recommended Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: light;
      --bg: #f6f8fc;
      --card: rgba(255,255,255,0.92);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --line: rgba(148, 163, 184, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 18%, rgba(96,165,250,0.16), transparent 60%),
        radial-gradient(circle at 80% 8%, rgba(191,219,254,0.55), transparent 50%),
        linear-gradient(180deg, #ffffff 0%, #eef4ff 100%);
      color: var(--text);
      padding: clamp(1.5rem, 3vw, 3.2rem);
      display: flex;
      justify-content: center;
    }
    .page {
      width: min(1120px, 100%);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    a.back-link {
      display: inline-flex;
      gap: 0.4rem;
      align-items: center;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      width: fit-content;
    }
    h1 { margin: 0.2rem 0 0.4rem; font-size: clamp(2rem, 4vw, 2.6rem); }
    p.lede { margin: 0; color: var(--muted); max-width: 620px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.2rem; }
    .agent-card {
      border-radius: 1.2rem;
      border: 1px solid var(--line);
      background: var(--card);
      padding: 1rem;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s ease, transform 0.15s ease;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .agent-card:hover { border-color: rgba(37,99,235,0.45); transform: translateY(-2px); }
    .agent-card.selected { border-color: rgba(37,99,235,0.7); background: rgba(37,99,235,0.1); }
    .agent-card strong { font-size: 1rem; }
    .agent-card p { margin: 0.4rem 0 0; font-size: 0.9rem; color: var(--muted); }
    .agent-card span.badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.75rem;
      background: rgba(37,99,235,0.08);
      color: #1d4ed8;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .section-head h2 { margin: 0; font-size: 1.2rem; }
    .section-card {
      border-radius: 1.6rem;
      border: 1px solid rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.78);
      box-shadow: 0 30px 80px rgba(37, 99, 235, 0.10);
      padding: 1.3rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .section-card + .section-card { margin-top: 1.2rem; }
    .search-box {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 0.35rem 0.85rem;
      background: rgba(255,255,255,0.92);
    }
    .search-box input {
      border: none;
      background: transparent;
      color: var(--text);
      width: 200px;
    }
    .search-box input:focus { outline: none; }
    .footer-actions {
      margin-top: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    button.primary {
      border: none;
      border-radius: 1rem;
      padding: 0.9rem 1.3rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: linear-gradient(120deg, #2563eb, #60a5fa);
      color: #ffffff;
      cursor: pointer;
      box-shadow: 0 18px 35px rgba(37, 99, 235, 0.22);
    }
    button.secondary {
      border-radius: 1rem;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
      color: var(--text);
      padding: 0.85rem 1.2rem;
      cursor: pointer;
    }
    .selected-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.25rem 0.8rem;
      font-size: 0.8rem;
      color: var(--muted);
      background: rgba(255,255,255,0.92);
    }
  
    /* Metrix responsive pass */
    img, svg, video, canvas {
      max-width: 100%;
      height: auto;
    }
    * {
      min-width: 0;
    }
    @media (max-width: 1024px) {
      .layout,
      .shell,
      .page-shell,
      .dashboard-grid,
      .content-grid,
      .two-col,
      .three-col,
      .hero-grid,
      .main-layout {
        grid-template-columns: 1fr !important;
      }
      .side-panel,
      .sidebar,
      aside,
      .right-panel,
      .left-panel {
        position: static !important;
        top: auto !important;
        height: auto !important;
        max-height: none !important;
      }
      .main-column,
      .list-scroll,
      .selected-list,
      .agents,
      .suggested-grid,
      .grid {
        max-height: none !important;
      }
    }
    @media (max-width: 768px) {
      body {
        padding: 4.5rem 1rem 1.25rem !important;
      }
      .wrap,
      .page,
      .card,
      .panel,
      .hero,
      .section-card,
      .side-panel,
      .main,
      .main-column,
      .content,
      .container {
        width: 100% !important;
        padding: 1.25rem !important;
      }
      .layout,
      .grid,
      .suggested-grid,
      .agents,
      .footer-actions,
      .toolbar,
      .section-head,
      .topbar,
      .header-actions {
        grid-template-columns: 1fr !important;
        flex-direction: column !important;
        align-items: stretch !important;
      }
      .nav-top,
      .back-link {
        max-width: 100%;
        white-space: normal;
      }
      .search-box,
      .search,
      .search-box input,
      input,
      select,
      textarea,
      button,
      .primary,
      .secondary {
        width: 100% !important;
      }
      table,
      .table-wrap {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      h1 {
        font-size: clamp(1.5rem, 7vw, 2rem) !important;
      }
      h2 {
        font-size: clamp(1.15rem, 5vw, 1.4rem) !important;
      }
    }
    @media (max-width: 480px) {
      body {
        padding: 4rem 0.85rem 1rem !important;
      }
      .nav-top,
      .back-link {
        padding: 0.55rem 0.85rem !important;
        gap: 0.4rem !important;
      }
      .wrap,
      .page,
      .card,
      .panel,
      .hero,
      .section-card,
      .side-panel,
      .main,
      .main-column,
      .content,
      .container {
        padding: 1rem !important;
        border-radius: 1rem !important;
      }
      .agents,
      .grid,
      .suggested-grid {
        gap: 0.75rem !important;
      }
      .agent-card,
      label.card,
      .selected-card {
        min-height: auto !important;
      }
    }

  </style>
</head>
<body>
  <div class="page">
    <a href="industry.html" class="back-link">← Back</a>
    <div>
      <h1 id="agentsTitle">Recommended agents</h1>
      <p class="lede" id="agentsSubtitle">Choose at least one starter agent pack to fast-track your workspace setup.</p>
    </div>

    <div class="section-card">
      <div class="section-head">
        <h2 id="recommendedLabel">Top picks</h2>
      </div>
      <div class="grid" id="recommendedGrid">Loading…</div>
    </div>

    <div class="section-card">
      <div class="section-head">
        <h2>Browse all templates</h2>
        <div class="search-box">
          <span>🔍</span>
          <input type="search" id="searchInput" placeholder="Search agents" />
        </div>
      </div>
      <div class="grid" id="allGrid"></div>
    </div>

    <div class="footer-actions">
      <button class="primary" id="continueBtn">Continue</button>
      <button class="secondary" id="skipBtn">Skip for now</button>
    </div>
  </div>

  <script>
    const recommendedGrid = document.getElementById('recommendedGrid');
    const allGrid = document.getElementById('allGrid');
    const searchInput = document.getElementById('searchInput');
    const selectedCount = document.getElementById('selectedCount');
    const continueBtn = document.getElementById('continueBtn');
    const skipBtn = document.getElementById('skipBtn');
    const titleEl = document.getElementById('agentsTitle');
    const subtitleEl = document.getElementById('agentsSubtitle');
    const recommendedLabel = document.getElementById('recommendedLabel');

    const industry = sessionStorage.getItem('operionIndustry') || 'General operations';
    titleEl.textContent = `Recommended agents for ${industry}`;
    subtitleEl.textContent = 'Choose the agents that match your workflows. We pre-selected ones based on your industry.';
    recommendedLabel.textContent = `Top picks for ${industry}`;

    const recommendedMap = {
      'Software & SaaS': [
        { title: 'Release Pilot', desc: 'Monitors deploy windows + release notes.' },
        { title: 'Incident Triage', desc: 'Sorts alerts, drafts comms automatically.' },
        { title: 'Product QA', desc: 'Runs smoke checks on nightly builds.' },
        { title: 'Customer Success Copilot', desc: 'Summaries for high-touch accounts.' }
      ],
      'Fintech / Banking': [
        { title: 'Risk Analyst', desc: 'Flags anomalous spend + risk queues.' },
        { title: 'Compliance Desk', desc: 'Keeps audit trails tidy.' },
        { title: 'Billing Desk', desc: 'Watches invoices + payouts.' },
        { title: 'Treasury Desk', desc: 'Reminds about liquidity thresholds.' }
      ],
      'E-commerce & Retail': [
        { title: 'Ops Analyst', desc: 'Tracks fulfillment SLAs.' },
        { title: 'Promo Calendar', desc: 'Plans drops + discount runs.' },
        { title: 'Inventory Pilot', desc: 'Warns on low-stock SKUs.' },
        { title: 'Support Inbox Copilot', desc: 'Drafts responses for VIP buyers.' }
      ]
    };

    const defaultAgents = [
      { title: 'Ops Analyst', desc: 'Keeps KPIs + alerts in one place.' },
      { title: 'Billing Desk', desc: 'Reconciles payments and invoices.' },
      { title: 'Compliance Desk', desc: 'Audit-ready snapshots.' },
      { title: 'Customer Success Copilot', desc: 'Daily health signals.' },
      { title: 'Incident Triage', desc: 'Escalation + paging rules.' },
      { title: 'Release Pilot', desc: 'Deploy timeline companion.' },
      { title: 'Risk Analyst', desc: 'Surface anomalies instantly.' },
      { title: 'Promo Calendar', desc: 'Campaign reminders + drafts.' }
    ];

    const recommendedList = recommendedMap[industry] || defaultAgents.slice(0, 4);
    const allAgents = Array.from(new Set([...defaultAgents, ...recommendedList]));
    const prevSelected = JSON.parse(sessionStorage.getItem('operionAgents') || '[]');
    const selected = new Set(prevSelected);

    const syncSelectedState = () => {
      document.querySelectorAll('.agent-card').forEach(card => {
        const title = card.dataset.title;
        if (!title) return;
        card.classList.toggle('selected', selected.has(title));
      });
      updateSelectedCount();
    };

    const renderCard = (agent, container) => {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'agent-card';
      card.dataset.title = agent.title;
      card.innerHTML = `<strong>${agent.title}</strong><p>${agent.desc || ''}</p>`;
      if (selected.has(agent.title)) card.classList.add('selected');
      card.addEventListener('click', () => {
        if (selected.has(agent.title)) {
          selected.delete(agent.title);
        } else {
          selected.add(agent.title);
        }
        syncSelectedState();
      });
      container.appendChild(card);
    };

    const renderRecommended = () => {
      recommendedGrid.innerHTML = '';
      recommendedList.forEach(agent => renderCard(agent, recommendedGrid));
      syncSelectedState();
    };

    const renderAll = (filter = '') => {
      allGrid.innerHTML = '';
      const list = allAgents.filter(agent => agent.title.toLowerCase().includes(filter.toLowerCase()));
      (list.length ? list : [{ title: 'No agents match that search.', desc: '' }]).forEach(agent => {
        if (agent.desc === '' && agent.title.startsWith('No agents')) {
          const empty = document.createElement('div');
          empty.style.color = 'var(--muted)';
          empty.textContent = agent.title;
          allGrid.appendChild(empty);
        } else {
          renderCard(agent, allGrid);
        }
      });
      syncSelectedState();
    };

    const updateSelectedCount = () => {
      if (selectedCount) selectedCount.textContent = `${selected.size} selected`;
      sessionStorage.setItem('operionAgents', JSON.stringify(Array.from(selected)));
    };

    continueBtn.addEventListener('click', () => {
      if (!selected.size) {
        alert('Pick at least one agent to continue.');
        return;
      }
      window.location.href = 'common-agents.html';
    });

    skipBtn.addEventListener('click', () => {
      sessionStorage.setItem('operionAgents', JSON.stringify(Array.from(selected)));
      window.location.href = 'common-agents.html';
    });

    searchInput.addEventListener('input', e => {
      renderAll(e.target.value.trim());
    });

    renderRecommended();
    renderAll();
    syncSelectedState();
  </script>
</body>
</html>
