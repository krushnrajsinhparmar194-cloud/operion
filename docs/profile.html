<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: dark;
      --bg: #030610;
      --card: rgba(255,255,255,0.03);
      --text: #eef2ff;
      --muted: #9badcf;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 20% 10%, rgba(124,107,255,0.25), transparent 50%), var(--bg); color: var(--text); padding: 3rem 2rem; }
    .nav-top { position: fixed; top: 1rem; left: 1rem; display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15); background: rgba(4,6,14,0.85); color: var(--text); text-decoration: none; }
    .nav-top .icon svg path { stroke: #fff; }
    .nav-top .icon { width: 1.1rem; height: 1.1rem; display: inline-flex; align-items: center; justify-content: center; }
    .wrap { max-width: 900px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; background: var(--card); padding: 2.5rem; backdrop-filter: blur(30px); display: flex; flex-direction: column; gap: 1.5rem; }
    .photo-card { display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: center; border: 1px dashed rgba(255,255,255,0.2); border-radius: 1.5rem; padding: 1.25rem; background: rgba(255,255,255,0.02); }
    .photo-preview { width: 140px; height: 140px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.12); background: radial-gradient(circle at 30% 30%, rgba(124,107,255,0.5), rgba(4,6,14,0.9)); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .photo-preview span { color: var(--muted); text-align: center; font-size: 0.9rem; padding: 0 1rem; }
    .photo-preview img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
    .photo-preview.has-photo span { opacity: 0; }
    .photo-preview.has-photo img { display: block; }
    .photo-actions { min-width: 220px; display: flex; flex-direction: column; gap: 0.8rem; }
    .upload-btn { display: inline-flex; align-items: center; gap: 0.6rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15); padding: 0.6rem 1.2rem; color: var(--text); background: rgba(124,107,255,0.15); cursor: pointer; width: fit-content; font-weight: 500; }
    .upload-btn svg { flex-shrink: 0; }
    .remove-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; text-decoration: underline; padding: 0; font: inherit; width: fit-content; }
    .photo-status { font-size: 0.85rem; color: var(--muted); min-height: 1.2rem; }
    h1 { margin: 0; }
    .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 1.5rem; z-index: 20; }
    .modal.open { display: flex; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(3,6,16,0.8); backdrop-filter: blur(6px); }
    .modal-panel { position: relative; width: min(480px, 92vw); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.08); background: rgba(4,6,14,0.95); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .modal-panel h2 { margin: 0; }
    .modal-form { display: flex; flex-direction: column; gap: 0.8rem; }
    .modal-form label { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .modal-form input { border: none; border-radius: 0.8rem; background: rgba(255,255,255,0.08); color: var(--text); padding: 0.6rem 0.75rem; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 0.8rem; margin-top: 0.2rem; }
    .modal-actions button { border-radius: 999px; padding: 0.7rem 1.4rem; border: none; cursor: pointer; font-weight: 600; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }
    .btn-primary { background: linear-gradient(120deg, #4da8ff, #7c6bff); color: #041021; }
    .language-field { display: flex; flex-direction: column; gap: 0.5rem; }
    .language-select { border-radius: 0.8rem; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: var(--text); padding: 0.6rem; font-size: 0.95rem; }
    .selected-stack { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .selected-stack .chip { border-radius: 999px; border: 1px solid rgba(255,255,255,0.2); padding: 0.3rem 0.75rem; display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; background: rgba(255,255,255,0.05); }
    .selected-stack button { border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 0.85rem; }
    .selected-hint { font-size: 0.8rem; color: var(--muted); margin: 0; }
    .section-head { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; }
    .action-row { display: inline-flex; gap: 0.8rem; }
    .ghost-btn { border-radius: 999px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: var(--text); padding: 0.6rem 1.1rem; cursor: pointer; font-weight: 500; }
    .ghost-btn:hover { border-color: rgba(255,255,255,0.3); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .card { border: 1px solid rgba(255,255,255,0.1); border-radius: 1.2rem; padding: 1rem; background: rgba(255,255,255,0.04); }
  </style>
</head>
<body>
  <a href="/dashboard.html" class="nav-top"><span class="icon" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M12.5 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Back</span></a>
  <div class="wrap">
    <div class="section-head">
      <h1 id="profileHeading">Profile</h1>
      <div class="action-row">
        <button type="button" class="ghost-btn" id="editProfileBtn">Edit profile</button>
        <button type="button" class="ghost-btn" id="settingsBtn">Settings</button>
      </div>
    </div>
    <div class="photo-card">
      <div class="photo-preview" id="photoPreview">
        <span id="photoPlaceholder">Add a profile photo</span>
        <img id="profilePhotoImage" alt="Profile photo" />
      </div>
      <div class="photo-actions">
        <label class="upload-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>Upload new photo</span>
          <input type="file" id="photoUpload" accept="image/*" hidden />
        </label>
        <button type="button" class="remove-btn" id="removePhoto">Remove photo</button>
        <div class="photo-status" id="photoStatus"></div>
      </div>
    </div>
    <div class="grid">
      <div class="card"><strong>Full name</strong><p id="profileName">—</p></div>
      <div class="card"><strong>Age</strong><p id="profileAge">—</p></div>
      <div class="card"><strong>Favorite color</strong><p id="profileColor">—</p></div>
      <div class="card"><strong>Favorite place</strong><p id="profilePlace">—</p></div>
      <div class="card"><strong>Occupation</strong><p id="profileOccupation">—</p></div>
      <div class="card"><strong>Lead agent</strong><p id="leadName">—</p></div>
      <div class="card"><strong>Languages</strong><p id="profileLanguages">—</p></div>
    </div>
    <div class="modal" id="editModal" aria-hidden="true">
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="editTitle">
        <h2 id="editTitle">Edit profile</h2>
        <form class="modal-form" id="editForm">
          <label>Full name<input id="modalName" placeholder="Your name" /></label>
          <label>Age<input type="number" id="modalAge" min="1" max="120" placeholder="Age" /></label>
          <label>Favorite color<input id="modalColor" placeholder="e.g., Indigo" /></label>
          <label>Favorite place<input id="modalPlace" placeholder="e.g., Goa" /></label>
          <label>Occupation<input id="modalOccupation" placeholder="Role" /></label>
          <label>Lead agent<input id="modalLead" placeholder="Agent name" /></label>
          <div class="language-field">
            <span class="field-label">Languages</span>
            <select id="languageSelect" class="language-select">
              <option value="" selected disabled>Pick a language to add</option>
              <option value="English">English</option>
              <option value="Gujarati">Gujarati</option>
              <option value="Hindi">Hindi</option>
              <option value="Spanish">Spanish</option>
              <option value="French">French</option>
              <option value="German">German</option>
              <option value="Portuguese">Portuguese</option>
              <option value="Italian">Italian</option>
              <option value="Arabic">Arabic</option>
              <option value="Bengali">Bengali</option>
              <option value="Mandarin">Mandarin</option>
              <option value="Japanese">Japanese</option>
              <option value="Korean">Korean</option>
              <option value="Russian">Russian</option>
              <option value="Dutch">Dutch</option>
              <option value="Swedish">Swedish</option>
              <option value="Norwegian">Norwegian</option>
              <option value="Danish">Danish</option>
              <option value="Turkish">Turkish</option>
              <option value="Thai">Thai</option>
              <option value="Vietnamese">Vietnamese</option>
              <option value="Indonesian">Indonesian</option>
              <option value="Malay">Malay</option>
              <option value="Punjabi">Punjabi</option>
              <option value="Marathi">Marathi</option>
              <option value="Telugu">Telugu</option>
              <option value="Tamil">Tamil</option>
              <option value="Kannada">Kannada</option>
              <option value="Malayalam">Malayalam</option>
              <option value="Filipino">Filipino</option>
              <option value="Hebrew">Hebrew</option>
              <option value="Greek">Greek</option>
              <option value="Polish">Polish</option>
              <option value="Czech">Czech</option>
              <option value="Ukrainian">Ukrainian</option>
              <option value="Romanian">Romanian</option>
              <option value="Hungarian">Hungarian</option>
            </select>
            <div class="selected-stack" id="selectedLanguages"></div>
            <p class="selected-hint" id="languageHint">Choose languages from the list.</p>
          </div>
        </form>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancelEdit">Cancel</button>
          <button type="button" class="btn-primary" id="saveEdit">Save</button>
        </div>
      </div>
    </div>
  </div>
        <script>
    const user = JSON.parse(sessionStorage.getItem('operionUserDetails') || '{}');
    let userName = sessionStorage.getItem('operionUserName') || '';
    let languages = JSON.parse(sessionStorage.getItem('operionAgentLanguage') || '[]');
    let lead = JSON.parse(sessionStorage.getItem('operionLeadAgent') || '{}');
    const languageOptions = ['English','Gujarati','Hindi','Spanish','French','German','Portuguese','Italian','Arabic','Bengali','Mandarin','Japanese','Korean','Russian','Dutch','Swedish','Norwegian','Danish','Turkish','Thai','Vietnamese','Indonesian','Malay','Punjabi','Marathi','Telugu','Tamil','Kannada','Malayalam','Filipino','Hebrew','Greek','Polish','Czech','Ukrainian','Romanian','Hungarian'];

    const summaryHeading = document.getElementById('profileHeading');
    const summaryName = document.getElementById('profileName');
    const summaryAge = document.getElementById('profileAge');
    const summaryColor = document.getElementById('profileColor');
    const summaryPlace = document.getElementById('profilePlace');
    const summaryOccupation = document.getElementById('profileOccupation');
    const summaryLanguages = document.getElementById('profileLanguages');
    const leadNameEl = document.getElementById('leadName');

    const statusEl = document.getElementById('photoStatus');

    const updateSummary = () => {
      summaryHeading.textContent = userName || 'Profile';
      summaryName.textContent = userName || '—';
      summaryAge.textContent = user.age || '—';
      summaryColor.textContent = user.favoriteColor || '—';
      summaryPlace.textContent = user.favoritePlace || '—';
      summaryOccupation.textContent = user.occupation || '—';
      summaryLanguages.textContent = languages.length ? languages.join(', ') : '—';
      leadNameEl.textContent = lead.name || '—';
    };

    updateSummary();

    const modal = document.getElementById('editModal');
    const modalName = document.getElementById('modalName');
    const modalAge = document.getElementById('modalAge');
    const modalColor = document.getElementById('modalColor');
    const modalPlace = document.getElementById('modalPlace');
    const modalOccupation = document.getElementById('modalOccupation');
    const modalLead = document.getElementById('modalLead');
    const languageSelect = document.getElementById('languageSelect');
    const selectedStack = document.getElementById('selectedLanguages');
    const languageHint = document.getElementById('languageHint');
    const saveEdit = document.getElementById('saveEdit');
    const cancelEdit = document.getElementById('cancelEdit');
    const editBtn = document.getElementById('editProfileBtn');
    const settingsBtn = document.getElementById('settingsBtn');

    const renderSelectedLanguages = () => {
      if (!selectedStack) return;
      if (!languages.length) {
        selectedStack.innerHTML = '<span class="selected-hint">No languages selected yet.</span>';
      } else {
        selectedStack.innerHTML = languages.map(lang => `
          <span class="chip">
            ${lang}
            <button type="button" data-lang="${lang}">×</button>
          </span>
        `).join('');
        selectedStack.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => {
            languages = languages.filter(item => item !== btn.dataset.lang);
            renderSelectedLanguages();
            languageHint.textContent = languages.length ? `${languages.length} selected` : 'Choose at least one language.';
          });
        });
      }
      languageHint.textContent = languages.length ? `${languages.length} selected` : 'Choose at least one language.';
    };

    renderSelectedLanguages();

    const hydrateSelect = () => {
      if (!languageSelect) return;
      languageSelect.innerHTML = '<option value="" selected disabled>Pick a language to add</option>' + languageOptions.map(lang => `<option value="${lang}">${lang}</option>`).join('');
      languageSelect.value = '';
      renderSelectedLanguages();
    };

    const openModal = () => {
      modalName.value = userName || '';
      modalAge.value = user.age || '';
      modalColor.value = user.favoriteColor || '';
      modalPlace.value = user.favoritePlace || '';
      modalOccupation.value = user.occupation || '';
      modalLead.value = lead.name || '';
      hydrateSelect();
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
    };

    const closeModal = () => {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
    };

    languageSelect?.addEventListener('change', () => {
      const chosen = languageSelect.value;
      if (!chosen) return;
      if (!languages.includes(chosen)) {
        languages.push(chosen);
        renderSelectedLanguages();
      }
      languageSelect.value = '';
    });

    editBtn?.addEventListener('click', () => {
      statusEl.textContent = '';
      openModal();
    });
    cancelEdit?.addEventListener('click', closeModal);
    document.getElementById('modalBackdrop')?.addEventListener('click', closeModal);

    saveEdit?.addEventListener('click', () => {
      if (!languages.length) {
        languageHint.textContent = 'Pick at least one language before saving.';
        return;
      }
      user.age = modalAge.value.trim();
      user.favoriteColor = modalColor.value.trim();
      user.favoritePlace = modalPlace.value.trim();
      user.occupation = modalOccupation.value.trim();
      userName = modalName.value.trim();
      lead.name = modalLead.value.trim();

      sessionStorage.setItem('operionUserDetails', JSON.stringify(user));
      sessionStorage.setItem('operionUserName', userName);
      sessionStorage.setItem('operionAgentLanguage', JSON.stringify(languages));
      sessionStorage.setItem('operionLeadAgent', JSON.stringify(lead));

      updateSummary();
      renderSelectedLanguages();
      statusEl.textContent = 'Profile saved.';
      setTimeout(() => statusEl.textContent = '', 2000);
      closeModal();
    });

    settingsBtn?.addEventListener('click', () => {
      statusEl.textContent = 'Settings panel will open here.';
      setTimeout(() => statusEl.textContent = '', 2000);
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && modal.classList.contains('open')) {
        closeModal();
      }
    });

    const photoKey = 'operionProfilePhoto';
    const previewEl = document.getElementById('photoPreview');
    const imgEl = document.getElementById('profilePhotoImage');
    const uploadInput = document.getElementById('photoUpload');
    const removeBtn = document.getElementById('removePhoto');

    const setPhoto = (dataUrl) => {
      if (dataUrl) {
        imgEl.src = dataUrl;
        previewEl.classList.add('has-photo');
      } else {
        imgEl.src = '';
        previewEl.classList.remove('has-photo');
      }
    };

    setPhoto(sessionStorage.getItem(photoKey));

    uploadInput?.addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        statusEl.textContent = 'Please select an image smaller than 2MB.';
        event.target.value = '';
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        sessionStorage.setItem(photoKey, dataUrl);
        setPhoto(dataUrl);
        statusEl.textContent = 'Photo updated. This will appear on the dashboard.';
        setTimeout(() => statusEl.textContent = '', 2500);
      };
      reader.readAsDataURL(file);
    });

    removeBtn?.addEventListener('click', () => {
      sessionStorage.removeItem(photoKey);
      uploadInput.value = '';
      setPhoto(null);
      statusEl.textContent = 'Photo removed.';
      setTimeout(() => statusEl.textContent = '', 2000);
    });
  </script>
</body>
</html>
