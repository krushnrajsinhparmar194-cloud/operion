<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Agents</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; background: #03050b; color: #eef2ff; padding: 2.5rem; }
    h1 { margin-bottom: 1rem; }
    .agents-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .agent-card { border-radius: 1.2rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); padding: 1rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .agent-card span { font-size: 0.85rem; color: #9badcf; }
    .status-badge { align-self: flex-start; border-radius: 999px; padding: 0.2rem 0.7rem; font-size: 0.8rem; }
    .status-online { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    .status-offline { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
  </style>
</head>
<body>
  <h1>Agents</h1>
  <div id="agentsGrid" class="agents-grid">Loading…</div>
  <script>
    fetch('agent-list.json')
      .then(resp => resp.json())
      .then(agents => {
        document.getElementById('agentsGrid').innerHTML = agents.map(agent => `
          <div class="agent-card">
            <strong>${agent.name}</strong>
            <span>Last active ${new Date(agent.last_active).toLocaleString()}</span>
            <span class="status-badge ${agent.status === 'online' ? 'status-online' : 'status-offline'}">${agent.status}</span>
          </div>
        `).join('');
      });
  </script>
</body>
</html>
