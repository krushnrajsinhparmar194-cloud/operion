<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: dark;
      --bg: #030610;
      --card: rgba(255,255,255,0.03);
      --text: #eef2ff;
      --muted: #9badcf;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 20% 10%, rgba(124,107,255,0.25), transparent 50%), var(--bg); color: var(--text); padding: 3rem 2rem; }
    .nav-top { position: fixed; top: 1rem; left: 1rem; display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15); background: rgba(4,6,14,0.85); color: var(--text); text-decoration: none; }
    .nav-top .icon { width: 1.1rem; height: 1.1rem; display: inline-flex; align-items: center; justify-content: center; }
    .wrap { max-width: 900px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; background: var(--card); padding: 2.5rem; backdrop-filter: blur(30px); display: flex; flex-direction: column; gap: 1.5rem; }
    .photo-card { display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: center; border: 1px dashed rgba(255,255,255,0.2); border-radius: 1.5rem; padding: 1.25rem; background: rgba(255,255,255,0.02); }
    .photo-preview { width: 140px; height: 140px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.12); background: radial-gradient(circle at 30% 30%, rgba(124,107,255,0.5), rgba(4,6,14,0.9)); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .photo-preview span { color: var(--muted); text-align: center; font-size: 0.9rem; padding: 0 1rem; }
    .photo-preview img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
    .photo-preview.has-photo span { opacity: 0; }
    .photo-preview.has-photo img { display: block; }
    .photo-actions { min-width: 220px; display: flex; flex-direction: column; gap: 0.8rem; }
    .upload-btn { display: inline-flex; align-items: center; gap: 0.6rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15); padding: 0.6rem 1.2rem; color: var(--text); background: rgba(124,107,255,0.15); cursor: pointer; width: fit-content; font-weight: 500; }
    .upload-btn svg { flex-shrink: 0; }
    .remove-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; text-decoration: underline; padding: 0; font: inherit; width: fit-content; }
    .photo-status { font-size: 0.85rem; color: var(--muted); min-height: 1.2rem; }
    h1 { margin: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .card { border: 1px solid rgba(255,255,255,0.1); border-radius: 1.2rem; padding: 1rem; background: rgba(255,255,255,0.04); display: flex; flex-direction: column; gap: 0.4rem; }
    .card strong { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .card input { border: none; border-radius: 0.8rem; background: rgba(255,255,255,0.08); color: var(--text); padding: 0.6rem 0.75rem; font-size: 1rem; }
    .card input:focus { outline: 2px solid rgba(124,107,255,0.5); }
    .save-btn { align-self: flex-end; border: none; border-radius: 999px; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: 600; color: #041021; background: linear-gradient(120deg, #4da8ff, #7c6bff); cursor: pointer; margin-top: 0.5rem; }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .save-status { font-size: 0.85rem; color: var(--muted); }
  </style>
</head>
<body>
  <a href="/dashboard.html" class="nav-top"><span class="icon" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M12.5 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Back</span></a>
  <div class="wrap">
    <h1 id="profileHeading">Profile</h1>
    <div class="photo-card">
      <div class="photo-preview" id="photoPreview">
        <span id="photoPlaceholder">Add a profile photo</span>
        <img id="profilePhotoImage" alt="Profile photo" />
      </div>
      <div class="photo-actions">
        <label class="upload-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>Upload new photo</span>
          <input type="file" id="photoUpload" accept="image/*" hidden />
        </label>
        <button type="button" class="remove-btn" id="removePhoto">Remove photo</button>
        <div class="photo-status" id="photoStatus"></div>
      </div>
    </div>
    <div class="grid" id="profileForm">
      <label class="card">
        <strong for="inputName">Full name</strong>
        <input id="inputName" name="name" placeholder="Your name" />
      </label>
      <label class="card">
        <strong for="inputAge">Age</strong>
        <input type="number" id="inputAge" name="age" min="1" max="120" placeholder="Age" />
      </label>
      <label class="card">
        <strong for="inputColor">Favorite color</strong>
        <input id="inputColor" name="favoriteColor" placeholder="e.g., Indigo" />
      </label>
      <label class="card">
        <strong for="inputPlace">Favorite place</strong>
        <input id="inputPlace" name="favoritePlace" placeholder="e.g., Goa" />
      </label>
      <label class="card">
        <strong for="inputOccupation">Occupation</strong>
        <input id="inputOccupation" name="occupation" placeholder="Role" />
      </label>
      <label class="card">
        <strong for="inputLanguages">Languages</strong>
        <input id="inputLanguages" name="languages" placeholder="Comma separated" />
      </label>
    </div>
    <button type="button" class="save-btn" id="saveProfile">Save details</button>
  </div>
  <script>
    const user = JSON.parse(sessionStorage.getItem('operionUserDetails') || '{}');
    const userName = sessionStorage.getItem('operionUserName') || '';
    const languages = JSON.parse(sessionStorage.getItem('operionAgentLanguage') || '[]');
    document.getElementById('profileHeading').textContent = userName || 'Profile';
    document.getElementById('profileName').textContent = userName || '—';
    document.getElementById('profileAge').textContent = user.age || '—';
    document.getElementById('profileColor').textContent = user.favoriteColor || '—';
    document.getElementById('profilePlace').textContent = user.favoritePlace || '—';
    document.getElementById('profileOccupation').textContent = user.occupation || '—';
    const displayName = document.getElementById('profileHeading');
    const nameField = document.getElementById('inputName');
    const ageField = document.getElementById('inputAge');
    const colorField = document.getElementById('inputColor');
    const placeField = document.getElementById('inputPlace');
    const occupationField = document.getElementById('inputOccupation');
    const languageField = document.getElementById('inputLanguages');
    const saveBtn = document.getElementById('saveProfile');
    const formEl = document.getElementById('profileForm');

    const updateSummary = () => {
      displayName.textContent = nameField.value || 'Profile';
    };

    const hydrateForm = () => {
      nameField.value = userName || '';
      ageField.value = user.age || '';
      colorField.value = user.favoriteColor || '';
      placeField.value = user.favoritePlace || '';
      occupationField.value = user.occupation || '';
      languageField.value = languages.join(', ');
      updateSummary();
    };

    hydrateForm();
    formEl?.addEventListener('input', () => {
      saveBtn.disabled = false;
    });

    saveBtn?.addEventListener('click', () => {
      const data = {
        age: ageField.value.trim(),
        favoriteColor: colorField.value.trim(),
        favoritePlace: placeField.value.trim(),
        occupation: occupationField.value.trim()
      };
      const updatedName = nameField.value.trim() || userName || '';
      document.getElementById('profileName').textContent = updatedName || '—';
      document.getElementById('profileHeading').textContent = updatedName || 'Profile';
      document.getElementById('profileAge').textContent = data.age || '—';
      document.getElementById('profileColor').textContent = data.favoriteColor || '—';
      document.getElementById('profilePlace').textContent = data.favoritePlace || '—';
      document.getElementById('profileOccupation').textContent = data.occupation || '—';
      sessionStorage.setItem('operionUserDetails', JSON.stringify(data));
      sessionStorage.setItem('operionUserName', nameField.value.trim());
      const langs = languageField.value.split(',').map(v => v.trim()).filter(Boolean);
      sessionStorage.setItem('operionAgentLanguage', JSON.stringify(langs));
      saveBtn.disabled = true;
      statusEl.textContent = 'Profile saved. Dashboard will reflect this.';
      setTimeout(() => statusEl.textContent = '', 2500);
    });

    document.getElementById('profileLanguages').textContent = languages.length ? languages.join(', ') : '—';
    const photoKey = 'operionProfilePhoto';
    const previewEl = document.getElementById('photoPreview');
    const imgEl = document.getElementById('profilePhotoImage');
    const statusEl = document.getElementById('photoStatus');
    const uploadInput = document.getElementById('photoUpload');
    const removeBtn = document.getElementById('removePhoto');
    const setPhoto = (dataUrl) => {
      if (dataUrl) {
        imgEl.src = dataUrl;
        previewEl.classList.add('has-photo');
      } else {
        imgEl.src = '';
        previewEl.classList.remove('has-photo');
      }
    };
    setPhoto(sessionStorage.getItem(photoKey));
    uploadInput?.addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        statusEl.textContent = 'Please select an image smaller than 2MB.';
        event.target.value = '';
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        sessionStorage.setItem(photoKey, dataUrl);
        setPhoto(dataUrl);
        statusEl.textContent = 'Photo updated. This will appear on the dashboard.';
        setTimeout(() => statusEl.textContent = '', 2500);
      };
      reader.readAsDataURL(file);
    });
    removeBtn?.addEventListener('click', () => {
      sessionStorage.removeItem(photoKey);
      uploadInput.value = '';
      setPhoto(null);
      statusEl.textContent = 'Photo removed.';
      setTimeout(() => statusEl.textContent = '', 2000);
    });
  </script>
</body>
</html>
