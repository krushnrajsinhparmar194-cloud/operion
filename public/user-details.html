<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Tell Us About Yourself</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: dark;
      --bg: #04060e;
      --text: #f6f8ff;
      --muted: #9badcf;
      --accent: #7c6bff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, rgba(124, 107, 255, 0.25), transparent 55%),
                  radial-gradient(circle at 80% 10%, rgba(77, 168, 255, 0.22), transparent 50%),
                  var(--bg);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 4rem 2rem 3rem;
      color: var(--text);
    }
    .nav-top { z-index: 50; position: fixed; top: 1.5rem; left: 1.5rem; display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); background: rgba(4,6,14,0.85); color: var(--text); text-decoration: none; font-weight: 500; }
    .nav-top .icon { width: 1.1rem; height: 1.1rem; display: inline-flex; align-items: center; justify-content: center; }
    .nav-top .icon svg { width: 100%; height: 100%; }
    .wrap { width: min(900px, 100%); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.08); padding: 3rem; background: rgba(5, 9, 20, 0.82); box-shadow: 0 40px 120px rgba(0,0,0,0.45); backdrop-filter: blur(32px); }
    h1 { margin: 0 0 0.3rem; }
    p { margin: 0 0 1.6rem; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.2rem; }
    label { display: block; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
    input, select, textarea { width: 100%; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.03); color: var(--text); padding: 0.9rem 1rem; font-size: 1rem; }
    textarea { resize: vertical; min-height: 110px; }
    button { width: 100%; border: none; border-radius: 1rem; padding: 1rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; background: linear-gradient(120deg, #4da8ff, #7c6bff); color: #041021; cursor: pointer; margin-top: 1.8rem; }
    .note { margin-top: 1rem; font-size: 0.9rem; color: var(--muted); }
  </style>
</head>
<body>
  <a href="/user-name.html" class="nav-top"><span class="icon" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M12.5 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Back</span></a>
  <div class="wrap">
    <h1>Tell us about you</h1>
    <p>This helps your agent personalize dashboards, colors, and updates.</p>
    <form id="detailsForm">
      <div class="grid">
        <div>
          <label for="age">Age</label>
          <input type="number" id="age" placeholder="e.g. 29" min="10" max="120" />
        </div>
        <div>
          <label for="favoriteColor">Favorite color</label>
          <input type="text" id="favoriteColor" placeholder="e.g. Midnight blue" />
        </div>
        <div>
          <label for="favoritePlace">Favorite place to visit</label>
          <input type="text" id="favoritePlace" placeholder="e.g. Himalayas" />
        </div>
        <div>
          <label for="occupation">What do you work on?</label>
          <input type="text" id="occupation" placeholder="e.g. Product designer" />
        </div>
        <div>
          <label for="email">Work email</label>
          <input type="email" id="email" placeholder="you@operion.ai" />
        </div>
        <div>
          <label for="phone">Phone / WhatsApp</label>
          <input type="tel" id="phone" placeholder="+91 90000 00000" />
        </div>
        <div>
          <label for="timezone">Timezone</label>
          <input type="text" id="timezone" placeholder="Asia/Kolkata" />
        </div>
        <div>
          <label for="hours">Typical working hours</label>
          <input type="text" id="hours" placeholder="9 AM – 6 PM IST" />
        </div>
      </div>
      <button type="submit">Save details</button>
      <div class="note" id="status"></div>
    </form>
  </div>
  <script>
    const form = document.getElementById('detailsForm');
    const status = document.getElementById('status');
    form.addEventListener('submit', e => {
      e.preventDefault();
      const payload = {
        age: document.getElementById('age').value,
        favoriteColor: document.getElementById('favoriteColor').value.trim(),
        favoritePlace: document.getElementById('favoritePlace').value.trim(),
        occupation: document.getElementById('occupation').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        timezone: document.getElementById('timezone').value.trim(),
        hours: document.getElementById('hours').value.trim()
      };
      sessionStorage.setItem('operionUserDetails', JSON.stringify(payload));
      window.location.href = '/welcome.html';
    });
  </script>
</body>
</html>
