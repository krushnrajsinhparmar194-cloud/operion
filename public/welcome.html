<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Welcome Aboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: light;
      --bg: #f6f8fc;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --line: rgba(148, 163, 184, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, rgba(96, 165, 250, 0.16), transparent 55%),
                  radial-gradient(circle at 80% 10%, rgba(191, 219, 254, 0.55), transparent 45%),
                  linear-gradient(180deg, #ffffff 0%, #eef4ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      color: var(--text);
      text-align: center;
      overflow: hidden;
    }
    .card {
      width: min(700px, 100%);
      border-radius: 2rem;
      padding: 3rem;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 30px 90px rgba(37, 99, 235, 0.12);
      backdrop-filter: blur(34px);
    }
    h1 { margin: 0 0 0.6rem; font-size: 2rem; }
    p { margin: 0 0 1.4rem; color: var(--muted); font-size: 1.05rem; }
    .primary { margin-top: 2rem; border: none; border-radius: 1rem; padding: 1rem 1.6rem; font-weight: 600; text-transform: uppercase; background: linear-gradient(120deg, #2563eb, #60a5fa); color: #ffffff; cursor: pointer;
      box-shadow: 0 18px 35px rgba(37, 99, 235, 0.22); }
  
    /* Metrix responsive pass */
    img, svg, video, canvas {
      max-width: 100%;
      height: auto;
    }
    * {
      min-width: 0;
    }
    @media (max-width: 1024px) {
      .layout,
      .shell,
      .page-shell,
      .dashboard-grid,
      .content-grid,
      .two-col,
      .three-col,
      .hero-grid,
      .main-layout {
        grid-template-columns: 1fr !important;
      }
      .side-panel,
      .sidebar,
      aside,
      .right-panel,
      .left-panel {
        position: static !important;
        top: auto !important;
        height: auto !important;
        max-height: none !important;
      }
      .main-column,
      .list-scroll,
      .selected-list,
      .agents,
      .suggested-grid,
      .grid {
        max-height: none !important;
      }
    }
    @media (max-width: 768px) {
      body {
        padding: 4.5rem 1rem 1.25rem !important;
      }
      .wrap,
      .page,
      .card,
      .panel,
      .hero,
      .section-card,
      .side-panel,
      .main,
      .main-column,
      .content,
      .container {
        width: 100% !important;
        padding: 1.25rem !important;
      }
      .layout,
      .grid,
      .suggested-grid,
      .agents,
      .footer-actions,
      .toolbar,
      .section-head,
      .topbar,
      .header-actions {
        grid-template-columns: 1fr !important;
        flex-direction: column !important;
        align-items: stretch !important;
      }
      .nav-top,
      .back-link {
        max-width: 100%;
        white-space: normal;
      }
      .search-box,
      .search,
      .search-box input,
      input,
      select,
      textarea,
      button,
      .primary,
      .secondary {
        width: 100% !important;
      }
      table,
      .table-wrap {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      h1 {
        font-size: clamp(1.5rem, 7vw, 2rem) !important;
      }
      h2 {
        font-size: clamp(1.15rem, 5vw, 1.4rem) !important;
      }
    }
    @media (max-width: 480px) {
      body {
        padding: 4rem 0.85rem 1rem !important;
      }
      .nav-top,
      .back-link {
        padding: 0.55rem 0.85rem !important;
        gap: 0.4rem !important;
      }
      .wrap,
      .page,
      .card,
      .panel,
      .hero,
      .section-card,
      .side-panel,
      .main,
      .main-column,
      .content,
      .container {
        padding: 1rem !important;
        border-radius: 1rem !important;
      }
      .agents,
      .grid,
      .suggested-grid {
        gap: 0.75rem !important;
      }
      .agent-card,
      label.card,
      .selected-card {
        min-height: auto !important;
      }
    }

  </style>
</head>
<body>
  <div class="card">
    <h1 id="welcomeTitle">Welcome!</h1>
    <p id="welcomeText">Your command agent is ready to orchestrate your ops.</p>
    <button class="primary" id="goDashboard">Enter dashboard</button>
  </div>
  <script>
    const lead = JSON.parse(sessionStorage.getItem('operionLeadAgent') || '{}');
    const userName = sessionStorage.getItem('operionUserName') || '';
    const title = document.getElementById('welcomeTitle');
    const text = document.getElementById('welcomeText');

    const agentName = lead.name || 'your command agent';
    title.textContent = `Welcome aboard, ${userName || 'operator'}!`;
    text.textContent = `${agentName} is all set. Let’s sync everything up on your dashboard.`;

    document.getElementById('goDashboard').addEventListener('click', () => {
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
