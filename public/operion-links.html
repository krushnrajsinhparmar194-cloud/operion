<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion Preview Links</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #030712;
      color: #f6f8ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .panel {
      width: min(480px, 100%);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1.5rem;
      padding: 2rem;
      box-shadow: 0 25px 80px rgba(0,0,0,0.45);
    }
    h1 { margin-top: 0; font-size: 1.8rem; }
    ul { list-style: none; padding: 0; margin: 1.5rem 0 0; }
    li { margin-bottom: 0.9rem; }
    a {
      display: block;
      background: linear-gradient(120deg, #4da8ff, #7c6bff);
      color: #030712;
      padding: 0.85rem 1rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      text-align: center;
    }
  
    /* Metrix responsive pass */
    img, svg, video, canvas {
      max-width: 100%;
      height: auto;
    }
    * {
      min-width: 0;
    }
    @media (max-width: 1024px) {
      .layout,
      .shell,
      .page-shell,
      .dashboard-grid,
      .content-grid,
      .two-col,
      .three-col,
      .hero-grid,
      .main-layout {
        grid-template-columns: 1fr !important;
      }
      .side-panel,
      .sidebar,
      aside,
      .right-panel,
      .left-panel {
        position: static !important;
        top: auto !important;
        height: auto !important;
        max-height: none !important;
      }
      .main-column,
      .list-scroll,
      .selected-list,
      .agents,
      .suggested-grid,
      .grid {
        max-height: none !important;
      }
    }
    @media (max-width: 768px) {
      body {
        padding: 4.5rem 1rem 1.25rem !important;
      }
      .wrap,
      .page,
      .card,
      .panel,
      .hero,
      .section-card,
      .side-panel,
      .main,
      .main-column,
      .content,
      .container {
        width: 100% !important;
        padding: 1.25rem !important;
      }
      .layout,
      .grid,
      .suggested-grid,
      .agents,
      .footer-actions,
      .toolbar,
      .section-head,
      .topbar,
      .header-actions {
        grid-template-columns: 1fr !important;
        flex-direction: column !important;
        align-items: stretch !important;
      }
      .nav-top,
      .back-link {
        max-width: 100%;
        white-space: normal;
      }
      .search-box,
      .search,
      .search-box input,
      input,
      select,
      textarea,
      button,
      .primary,
      .secondary {
        width: 100% !important;
      }
      table,
      .table-wrap {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      h1 {
        font-size: clamp(1.5rem, 7vw, 2rem) !important;
      }
      h2 {
        font-size: clamp(1.15rem, 5vw, 1.4rem) !important;
      }
    }
    @media (max-width: 480px) {
      body {
        padding: 4rem 0.85rem 1rem !important;
      }
      .nav-top,
      .back-link {
        padding: 0.55rem 0.85rem !important;
        gap: 0.4rem !important;
      }
      .wrap,
      .page,
      .card,
      .panel,
      .hero,
      .section-card,
      .side-panel,
      .main,
      .main-column,
      .content,
      .container {
        padding: 1rem !important;
        border-radius: 1rem !important;
      }
      .agents,
      .grid,
      .suggested-grid {
        gap: 0.75rem !important;
      }
      .agent-card,
      label.card,
      .selected-card {
        min-height: auto !important;
      }
    }

  </style>
</head>
<body>
  <div class="panel">
    <h1>Operion UI Links</h1>
    <ul>
      <li><a href="https://htmlpreview.github.io/?https://raw.githubusercontent.com/krushnrajsinhparmar194-cloud/operion/main/public/index.html" target="_blank">Landing</a></li>
      <li><a href="https://htmlpreview.github.io/?https://raw.githubusercontent.com/krushnrajsinhparmar194-cloud/operion/main/public/login.html" target="_blank">Login</a></li>
      <li><a href="https://htmlpreview.github.io/?https://raw.githubusercontent.com/krushnrajsinhparmar194-cloud/operion/main/public/signup.html" target="_blank">Signup</a></li>
      <li><a href="https://htmlpreview.github.io/?https://raw.githubusercontent.com/krushnrajsinhparmar194-cloud/operion/main/public/agents.html" target="_blank">Agents Library</a></li>
      <li><a href="https://htmlpreview.github.io/?https://raw.githubusercontent.com/krushnrajsinhparmar194-cloud/operion/main/public/dashboard.html" target="_blank">Dashboard</a></li>
    </ul>
  </div>
</body>
</html>
