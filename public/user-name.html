<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Add Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: light;
      --bg: #f6f8fc;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --line: rgba(148, 163, 184, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, rgba(96, 165, 250, 0.16), transparent 55%),
                  radial-gradient(circle at 80% 10%, rgba(191, 219, 254, 0.55), transparent 45%),
                  linear-gradient(180deg, #ffffff 0%, #eef4ff 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 4rem 2rem 3rem;
      color: var(--text);
    }
    .nav-top { z-index: 50; position: fixed; top: 1.5rem; left: 1.5rem; display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 999px; border: 1px solid var(--line); background: rgba(255,255,255,0.92); color: var(--text); text-decoration: none; font-weight: 500; }
    .nav-top .icon { width: 1.1rem; height: 1.1rem; display: inline-flex; align-items: center; justify-content: center; }
    .nav-top .icon svg { width: 100%; height: 100%; }
    .wrap { width: min(700px, 100%); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.7); padding: 2.5rem; background: rgba(255, 255, 255, 0.82); box-shadow: 0 40px 90px rgba(37, 99, 235, 0.12); backdrop-filter: blur(30px); }
    h1 { margin: 0 0 0.4rem; }
    p { margin: 0 0 1.4rem; color: var(--muted); }
    label { display: block; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    input { width: 100%; border-radius: 1rem; border: 1px solid var(--line); background: #ffffff; color: var(--text); padding: 0.95rem 1.1rem; font-size: 1rem; box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04); }
    button { width: 100%; border: none; border-radius: 1rem; padding: 1rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; background: linear-gradient(120deg, #2563eb, #60a5fa); color: #ffffff; cursor: pointer;
      box-shadow: 0 18px 35px rgba(37, 99, 235, 0.22); margin-top: 1.5rem; }
    .note { margin-top: 1rem; color: var(--muted); font-size: 0.9rem; }
  
    /* Metrix responsive pass */
    img, svg, video, canvas {
      max-width: 100%;
      height: auto;
    }
    * {
      min-width: 0;
    }
    @media (max-width: 1024px) {
      .layout,
      .shell,
      .page-shell,
      .dashboard-grid,
      .content-grid,
      .two-col,
      .three-col,
      .hero-grid,
      .main-layout {
        grid-template-columns: 1fr !important;
      }
      .side-panel,
      .sidebar,
      aside,
      .right-panel,
      .left-panel {
        position: static !important;
        top: auto !important;
        height: auto !important;
        max-height: none !important;
      }
      .main-column,
      .list-scroll,
      .selected-list,
      .agents,
      .suggested-grid,
      .grid {
        max-height: none !important;
      }
    }
    @media (max-width: 768px) {
      body {
        padding: 4.5rem 1rem 1.25rem !important;
      }
      .wrap,
      .page,
      .card,
      .panel,
      .hero,
      .section-card,
      .side-panel,
      .main,
      .main-column,
      .content,
      .container {
        width: 100% !important;
        padding: 1.25rem !important;
      }
      .layout,
      .grid,
      .suggested-grid,
      .agents,
      .footer-actions,
      .toolbar,
      .section-head,
      .topbar,
      .header-actions {
        grid-template-columns: 1fr !important;
        flex-direction: column !important;
        align-items: stretch !important;
      }
      .nav-top,
      .back-link {
        max-width: 100%;
        white-space: normal;
      }
      .search-box,
      .search,
      .search-box input,
      input,
      select,
      textarea,
      button,
      .primary,
      .secondary {
        width: 100% !important;
      }
      table,
      .table-wrap {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      h1 {
        font-size: clamp(1.5rem, 7vw, 2rem) !important;
      }
      h2 {
        font-size: clamp(1.15rem, 5vw, 1.4rem) !important;
      }
    }
    @media (max-width: 480px) {
      body {
        padding: 4rem 0.85rem 1rem !important;
      }
      .nav-top,
      .back-link {
        padding: 0.55rem 0.85rem !important;
        gap: 0.4rem !important;
      }
      .wrap,
      .page,
      .card,
      .panel,
      .hero,
      .section-card,
      .side-panel,
      .main,
      .main-column,
      .content,
      .container {
        padding: 1rem !important;
        border-radius: 1rem !important;
      }
      .agents,
      .grid,
      .suggested-grid {
        gap: 0.75rem !important;
      }
      .agent-card,
      label.card,
      .selected-card {
        min-height: auto !important;
      }
    }

  </style>
</head>
<body>
  <a href="language.html" class="nav-top"><span class="icon" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M12.5 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Back</span></a>
  <div class="wrap">
    <h1>Add your name</h1>
    <p>Let Operion know how to address you in dashboards and agent reports.</p>
    <form id="userNameForm">
      <label for="userName">Your name</label>
      <input type="text" id="userName" placeholder="e.g. Krushnaraj Parmar" required />
      <button type="submit">Save & finish</button>
      <div class="note" id="status"></div>
    </form>
  </div>
  <script>
    const form = document.getElementById('userNameForm');
    const status = document.getElementById('status');
    form.addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('userName').value.trim();
      if (!name) {
        status.textContent = 'Please enter your name.';
        return;
      }
      sessionStorage.setItem('operionUserName', name);
      window.location.href = 'user-details.html';
    });
  </script>
</body>
</html>
