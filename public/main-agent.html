<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Name Your Command Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: light;
      --page-bg: #eef4fb;
      --page-accent-1: rgba(124, 107, 255, 0.18);
      --page-accent-2: rgba(77, 168, 255, 0.2);
      --card: rgba(255, 255, 255, 0.92);
      --card-border: rgba(148, 163, 184, 0.22);
      --text: #111827;
      --muted: #667085;
      --label: #5a6b84;
      --field-bg: #f8fbff;
      --field-border: #d8e2f0;
      --field-focus: rgba(124, 107, 255, 0.24);
      --shadow: 0 30px 80px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
      min-width: 0;
    }

    img, svg, video, canvas {
      max-width: 100%;
      height: auto;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 16%, var(--page-accent-1), transparent 42%),
        radial-gradient(circle at 88% 10%, var(--page-accent-2), transparent 36%),
        linear-gradient(180deg, #f8fbff 0%, var(--page-bg) 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: clamp(4.8rem, 8vw, 6rem) 1.25rem 2rem;
      color: var(--text);
    }

    .nav-top {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.72rem 1.1rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
    }

    .nav-top .icon {
      width: 1.05rem;
      height: 1.05rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: inherit;
    }

    .nav-top .icon svg {
      width: 100%;
      height: 100%;
    }

    .wrap {
      width: min(940px, 100%);
      border-radius: 2rem;
      border: 1px solid var(--card-border);
      padding: clamp(1.4rem, 3vw, 2.75rem);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(26px);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.1rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    p.lede {
      margin: 0.9rem 0 2rem;
      color: var(--muted);
      max-width: 720px;
      font-size: clamp(1rem, 2vw, 1.1rem);
      line-height: 1.6;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--label);
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      border-radius: 1.1rem;
      border: 1px solid var(--field-border);
      background: var(--field-bg);
      color: var(--text);
      padding: 1rem 1.15rem;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input::placeholder,
    textarea::placeholder {
      color: #98a2b3;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(124, 107, 255, 0.45);
      box-shadow: 0 0 0 4px var(--field-focus);
      background: #ffffff;
    }

    textarea {
      resize: vertical;
      min-height: 140px;
      line-height: 1.55;
    }

    .primary {
      margin-top: 0.5rem;
      width: 100%;
      border: none;
      border-radius: 1.15rem;
      padding: 1rem 1.2rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(120deg, #4da8ff, #7c6bff);
      color: #05101f;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(77, 168, 255, 0.26);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 48px rgba(77, 168, 255, 0.3);
    }

    .note {
      min-height: 1.3rem;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .summary {
      margin-top: 2rem;
      border-radius: 1.6rem;
      border: 1px solid var(--field-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(245,249,255,0.96) 100%);
      padding: 1.5rem;
    }

    .summary h3 {
      margin: 0 0 0.9rem;
      font-size: 1.05rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }

    .chip {
      padding: 0.62rem 0.95rem;
      border-radius: 999px;
      border: 1px solid #d9e3f0;
      background: #ffffff;
      font-size: 0.9rem;
      color: #344054;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
    }

    @media (max-width: 1024px) {
      .layout,
      .shell,
      .page-shell,
      .dashboard-grid,
      .content-grid,
      .two-col,
      .three-col,
      .hero-grid,
      .main-layout {
        grid-template-columns: 1fr !important;
      }

      .side-panel,
      .sidebar,
      aside,
      .right-panel,
      .left-panel {
        position: static !important;
        top: auto !important;
        height: auto !important;
        max-height: none !important;
      }

      .main-column,
      .list-scroll,
      .selected-list,
      .agents,
      .suggested-grid,
      .grid {
        max-height: none !important;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 4.5rem 1rem 1.25rem !important;
      }

      .wrap,
      .page,
      .card,
      .panel,
      .hero,
      .section-card,
      .side-panel,
      .main,
      .main-column,
      .content,
      .container {
        width: 100% !important;
        padding: 1.25rem !important;
      }

      .layout,
      .grid,
      .suggested-grid,
      .agents,
      .footer-actions,
      .toolbar,
      .section-head,
      .topbar,
      .header-actions {
        grid-template-columns: 1fr !important;
        flex-direction: column !important;
        align-items: stretch !important;
      }

      .nav-top,
      .back-link {
        top: 0.8rem;
        left: 0.8rem;
        max-width: 100%;
        white-space: normal;
      }

      .search-box,
      .search,
      .search-box input,
      input,
      select,
      textarea,
      button,
      .primary,
      .secondary {
        width: 100% !important;
      }

      table,
      .table-wrap {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      h1 {
        font-size: clamp(1.5rem, 7vw, 2rem) !important;
      }

      h2 {
        font-size: clamp(1.15rem, 5vw, 1.4rem) !important;
      }

      .summary {
        padding: 1.15rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 4rem 0.85rem 1rem !important;
      }

      .nav-top,
      .back-link {
        padding: 0.55rem 0.85rem !important;
        gap: 0.4rem !important;
      }

      .wrap,
      .page,
      .card,
      .panel,
      .hero,
      .section-card,
      .side-panel,
      .main,
      .main-column,
      .content,
      .container {
        padding: 1rem !important;
        border-radius: 1rem !important;
      }

      .agents,
      .grid,
      .suggested-grid {
        gap: 0.75rem !important;
      }

      .agent-card,
      label.card,
      .selected-card {
        min-height: auto !important;
      }
    }
  </style>
</head>
<body>
  <a href="common-agents.html" class="nav-top"><span class="icon" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M12.5 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Back</span></a>
  <div class="wrap">
    <h1>Name your command agent</h1>
    <p class="lede">All the agents you just selected will report into one lead AI. Give it a memorable name so your team can summon it anywhere in Operion.</p>
    <form id="mainAgentForm">
      <div class="field">
        <label for="agentName">Agent name</label>
        <input id="agentName" type="text" placeholder="e.g. Orion, Ops Brain, Control Tower" required />
      </div>
      <div class="field">
        <label for="agentPurpose">What should this agent oversee?</label>
        <textarea id="agentPurpose" placeholder="Describe how this lead agent should orchestrate the other agents (optional)"></textarea>
      </div>
      <button class="primary" type="submit">Save lead agent</button>
      <div class="note" id="status"></div>
    </form>
    <div class="summary">
      <h3>Agents under this lead</h3>
      <div class="chips" id="agentChips">Loading your selections…</div>
    </div>
  </div>
  <script>
    const chipsEl = document.getElementById('agentChips');
    const statusEl = document.getElementById('status');
    const form = document.getElementById('mainAgentForm');
    const nameInput = document.getElementById('agentName');
    const purposeInput = document.getElementById('agentPurpose');

    function loadSelections() {
      const preset = JSON.parse(sessionStorage.getItem('operionAgents') || '[]');
      const customs = JSON.parse(sessionStorage.getItem('operionCustomAgents') || '[]');
      const commons = JSON.parse(sessionStorage.getItem('operionCommonAgents') || '[]');
      let combined = [
        ...preset,
        ...customs.map(c => c.name || c),
        ...commons
      ].filter(Boolean);

      if (!combined.length) {
        const legacy = JSON.parse(sessionStorage.getItem('operionCombinedAgents') || 'null');
        if (legacy) {
          combined = [
            ...(legacy.preset || []),
            ...((legacy.custom || []).map(c => c.name || c))
          ].filter(Boolean);
        }
      }

      if (!combined.length) {
        chipsEl.textContent = 'No agents linked yet. Go back and pick at least one agent.';
        return;
      }

      chipsEl.innerHTML = combined.map(name => `<span class="chip">${name}</span>`).join('');
    }

    loadSelections();

    form.addEventListener('submit', e => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const purpose = purposeInput.value.trim();
      if (!name) {
        statusEl.textContent = 'Give your command agent a name.';
        return;
      }
      sessionStorage.setItem('operionLeadAgent', JSON.stringify({ name, purpose }));
      window.location.href = 'language.html';
    });
  </script>
</body>
</html>
