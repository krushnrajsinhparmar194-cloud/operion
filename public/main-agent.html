<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operion · Name Your Command Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, sans-serif;
      color-scheme: dark;
      --bg: #04060e;
      --card: rgba(255, 255, 255, 0.04);
      --text: #f6f8ff;
      --muted: #9badcf;
      --accent: #7c6bff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, rgba(124, 107, 255, 0.25), transparent 55%),
                  radial-gradient(circle at 80% 10%, rgba(77, 168, 255, 0.22), transparent 50%),
                  var(--bg);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 4rem 2rem 3rem;
      color: var(--text);
      overflow-y: auto;
    }
    .nav-top {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(4, 6, 14, 0.75);
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
    }
    .nav-top .icon { width: 1.1rem; height: 1.1rem; display: inline-flex; align-items: center; justify-content: center; }
    .nav-top .icon svg { width: 100%; height: 100%; }
    .wrap {
      width: min(900px, 100%);
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 3rem;
      background: rgba(6, 11, 22, 0.78);
      box-shadow: 0 40px 120px rgba(0,0,0,0.45);
      backdrop-filter: blur(32px);
    }
    h1 { margin: 0 0 0.4rem; }
    p.lede { margin: 0 0 2rem; color: var(--muted); max-width: 640px; }
    label { display: block; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    input + label, textarea + label { margin-top: 1.4rem; }
    input, textarea {
      width: 100%;
      border-radius: 1rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 1rem 1.2rem;
      font-size: 1rem;
    }
    textarea { resize: vertical; min-height: 110px; }
    .summary {
      margin-top: 2rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      padding: 1.5rem;
    }
    .summary h3 { margin: 0 0 0.8rem; font-size: 1rem; }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .chip {
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      font-size: 0.85rem;
    }
    .primary {
      margin-top: 2rem;
      width: 100%;
      border: none;
      border-radius: 1.1rem;
      padding: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(120deg, #4da8ff, #7c6bff);
      color: #041021;
      cursor: pointer;
    }
    .note { margin-top: 1rem; font-size: 0.9rem; color: var(--muted); }
  </style>
</head>
<body>
  <a href="/common-agents.html" class="nav-top"><span class="icon" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M12.5 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Back</span></a>
  <div class="wrap">
    <h1>Name your command agent</h1>
    <p class="lede">All the agents you just selected will report into one lead AI. Give it a memorable name so your team can summon it anywhere in Operion.</p>
    <form id="mainAgentForm">
      <label for="agentName">Agent name</label>
      <input id="agentName" type="text" placeholder="e.g. Orion, Ops Brain, Control Tower" required />
      <label for="agentPurpose">What should this agent oversee?</label>
      <textarea id="agentPurpose" placeholder="Describe how this lead agent should orchestrate the other agents (optional)"></textarea>
      <button class="primary" type="submit">Save lead agent</button>
      <div class="note" id="status"></div>
    </form>
    <div class="summary">
      <h3>Agents under this lead</h3>
      <div class="chips" id="agentChips">Loading your selections…</div>
    </div>
  </div>
  <script>
    const chipsEl = document.getElementById('agentChips');
    const statusEl = document.getElementById('status');
    const form = document.getElementById('mainAgentForm');
    const nameInput = document.getElementById('agentName');
    const purposeInput = document.getElementById('agentPurpose');

    function loadSelections() {
      const preset = JSON.parse(sessionStorage.getItem('operionAgents') || '[]');
      const customs = JSON.parse(sessionStorage.getItem('operionCustomAgents') || '[]');
      const commons = JSON.parse(sessionStorage.getItem('operionCommonAgents') || '[]');
      let combined = [
        ...preset,
        ...customs.map(c => c.name || c),
        ...commons
      ].filter(Boolean);

      if (!combined.length) {
        const legacy = JSON.parse(sessionStorage.getItem('operionCombinedAgents') || 'null');
        if (legacy) {
          combined = [
            ...(legacy.preset || []),
            ...((legacy.custom || []).map(c => c.name || c))
          ].filter(Boolean);
        }
      }

      if (!combined.length) {
        chipsEl.textContent = 'No agents linked yet. Go back and pick at least one agent.';
        return;
      }

      chipsEl.innerHTML = combined.map(name => `<span class="chip">${name}</span>`).join('');
    }

    loadSelections();

    form.addEventListener('submit', e => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const purpose = purposeInput.value.trim();
      if (!name) {
        statusEl.textContent = 'Give your command agent a name.';
        return;
      }
      sessionStorage.setItem('operionLeadAgent', JSON.stringify({ name, purpose }));
      window.location.href = '/language.html';
    });
  </script>
</body>
</html>
